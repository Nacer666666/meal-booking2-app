<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الوجبات اليومي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #message { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍽️ حجز الوجبات</h2>
    
    <h3>الخطوة 1: تفعيل التنبيهات</h3>
    <input type="text" id="nameReg" placeholder="اكتب اسمك الكامل">
    <button onclick="registerTelegram()">تفعيل التذكير عبر تيليجرام</button>

    <hr>

    <h3>الخطوة 2: اختيار اليوم</h3>
    <input type="text" id="nameSubmit" placeholder="اكتب اسمك">
    <select id="choice">
        <option value="lunch">غداء</option>
        <option value="dinner">عشاء</option>
        <option value="both">غداء وعشاء</option>
        <option value="none">لا أريد شيئاً</option>
    </select>
    <button onclick="submitMeal()">إرسال الاختيار</button>

    <div id="message"></div>
</div>

<script>
    async function showMsg(text, color) {
        const m = document.getElementById('message');
        m.innerText = text;
        m.style.backgroundColor = color;
        m.style.display = 'block';
    }

    async function registerTelegram() {
        const name = document.getElementById('nameReg').value;
        const res = await fetch('/.netlify/functions/register', {
            method: 'POST',
            body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (data.deepLink) {
            window.location.href = data.deepLink;
        } else {
            showMsg(data.error || "حدث خطأ", "#ffcccc");
        }
    }

    async function submitMeal() {
        const name = document.getElementById('nameSubmit').value;
        const choice = document.getElementById('choice').value;
        const res = await fetch('/.netlify/functions/submit', {
            method: 'POST',
            body: JSON.stringify({ name, choice })
        });
        const data = await res.json();
        if (data.ok) showMsg("تم تسجيل اختيارك بنجاح! ✅", "#ccffcc");
        else showMsg(data.error || "خطأ في الإرسال", "#ffcccc");
    }
</script>

</body>
</html>
